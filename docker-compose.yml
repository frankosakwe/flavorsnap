version: '3.8'

services:
  # Frontend development service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - NEXT_PUBLIC_MODEL_ENDPOINT=/predict
    depends_on:
      - backend
    networks:
      - flavorsnap-network
    restart: unless-stopped

  # Backend ML API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - ./ml-model-api:/app/ml-model-api
      - ./model.pth:/app/model.pth
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONPATH=/app
    networks:
      - flavorsnap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flavorsnap-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # PostgreSQL for data persistence (optional)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: flavorsnap
      POSTGRES_USER: flavorsnap
      POSTGRES_PASSWORD: flavorsnap_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - flavorsnap-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  flavorsnap-network:
    driver: bridge
